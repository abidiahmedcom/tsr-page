<footer class="footer">
    <div class="footer-content">
        <div class="footer-icons">
            {% for contact in site.contacts %}
            <a href="{{ contact.url }}" class="contact-link" target="_blank"><i class="{{ contact.icon }}"></i></a>
            {% endfor %}
        </div>
        <p>&copy; Copyright <span id="current-year"></span> {{ site.first_name }} {{ site.middle_name }} {{ site.last_name }}. Powered by Eleventy. Inspired by tsr-page theme. Hosted by GitHub Pages. Photos from Unsplash. </p>
    </div>
</footer>
